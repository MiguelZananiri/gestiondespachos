services:
  producer-service:
    image: ${DOCKERHUB_USERNAME}/producer-service:${IMAGE_TAG:-latest}
    container_name: producer-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      AZURE_B2C_ISSUER_URI: ${AZURE_B2C_ISSUER_URI}
      AZURE_B2C_JWK_SET_URI: ${AZURE_B2C_JWK_SET_URI}
      AZURE_B2C_AUDIENCE: ${AZURE_B2C_AUDIENCE}
    networks:
      - cloudnative-net

  consumer-service:
    image: ${DOCKERHUB_USERNAME}/consumer-service:${IMAGE_TAG:-latest}
    container_name: consumer-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    networks:
      - cloudnative-net

networks:
  cloudnative-net:
    external: true
