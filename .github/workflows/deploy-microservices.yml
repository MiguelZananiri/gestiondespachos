name: Build and Deploy Microservices

on:
  push:
    branches:
      - main

jobs:
  build-producer:
    name: Build Producer Service
    runs-on: ubuntu-latest

    env:
      PRODUCER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/producer-service
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Test producer-service
        run: |
          cd producer-service
          mvn -B clean test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push producer image
        uses: docker/build-push-action@v6
        with:
          context: ./producer-service
          push: true
          tags: |
            ${{ env.PRODUCER_IMAGE }}:latest
            ${{ env.PRODUCER_IMAGE }}:${{ env.IMAGE_TAG }}

  build-consumer:
    name: Build Consumer Service
    runs-on: ubuntu-latest

    env:
      CONSUMER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/consumer-service
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Test consumer-service
        run: |
          cd consumer-service
          mvn -B clean test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push consumer image
        uses: docker/build-push-action@v6
        with:
          context: ./consumer-service
          push: true
          tags: |
            ${{ env.CONSUMER_IMAGE }}:latest
            ${{ env.CONSUMER_IMAGE }}:${{ env.IMAGE_TAG }}

  deploy-microservices:
    name: Deploy Microservices on EC2
    runs-on: ubuntu-latest
    needs:
      - build-producer
      - build-consumer

    env:
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare microservices directories on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            mkdir -p /home/ec2-user/micro-servicio1
            mkdir -p /home/ec2-user/micro-servicio2
            mkdir -p /home/ec2-user/rabbitmq

      - name: Copy microservices compose file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy/compose.microservices.yml"
          target: "/home/ec2-user/micro-servicio1"
          strip_components: 1

      - name: Deploy producer and consumer
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          RABBITMQ_USERNAME: ${{ secrets.RABBITMQ_USERNAME }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
          AZURE_B2C_ISSUER_URI: ${{ secrets.AZURE_B2C_ISSUER_URI }}
          AZURE_B2C_JWK_SET_URI: ${{ secrets.AZURE_B2C_JWK_SET_URI }}
          AZURE_B2C_AUDIENCE: ${{ secrets.AZURE_B2C_AUDIENCE }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,IMAGE_TAG,RABBITMQ_USERNAME,RABBITMQ_PASSWORD,AZURE_B2C_ISSUER_URI,AZURE_B2C_JWK_SET_URI,AZURE_B2C_AUDIENCE
          script: |
            set -e

            cd /home/ec2-user/micro-servicio1

            docker network create cloudnative-net || true

            cat > .env <<EOF
            DOCKERHUB_USERNAME=${DOCKERHUB_USERNAME}
            IMAGE_TAG=${IMAGE_TAG}
            RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
            RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
            AZURE_B2C_ISSUER_URI=${AZURE_B2C_ISSUER_URI}
            AZURE_B2C_JWK_SET_URI=${AZURE_B2C_JWK_SET_URI}
            AZURE_B2C_AUDIENCE=${AZURE_B2C_AUDIENCE}
            EOF

            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

            docker compose -f compose.microservices.yml --env-file .env pull
            docker compose -f compose.microservices.yml --env-file .env up -d

            docker image prune -f
            docker ps --filter name=producer-service
            docker ps --filter name=consumer-service
